# Per-plugin release: push a `<plugin>-v<version>` tag (e.g. s3-storage-v0.1.0,
# version matching that plugin's manifest.toml) to build, package and attach
# <id>-<version>.jplug (+ .sha256) to a GitHub Release.
name: Release

on:
  push:
    tags: ["*-v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Parse tag and verify manifest version
        run: |
          plugin="${GITHUB_REF_NAME%-v*}"
          ver="${GITHUB_REF_NAME##*-v}"
          if [ ! -d "$plugin" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match a plugin directory ($plugin)"
            exit 1
          fi
          got=$(grep -m1 '^version = ' "$plugin/manifest.toml" | cut -d'"' -f2)
          if [ "$got" != "$ver" ]; then
            echo "::error::$plugin/manifest.toml version is $got but tag says $ver"
            exit 1
          fi
          echo "PLUGIN=$plugin" >> "$GITHUB_ENV"
      - name: Unit tests (native)
        run: cargo test -p "$PLUGIN"
      - name: Build wasm
        run: cargo build --release --target wasm32-unknown-unknown -p "$PLUGIN"
      - name: Validate + package
        run: python3 scripts/package.py "$PLUGIN"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.jplug dist/*.sha256 --title "$GITHUB_REF_NAME" --generate-notes
